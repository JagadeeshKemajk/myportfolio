<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Accent Bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>
  
  <!-- Main Content -->
  <g>
    <!-- Name -->
    <text x="60" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
      Jagadeesh Kema
    </text>
    
    <!-- Title & Subtitle -->
    <text x="60" y="370" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="#06B6D4">
      .NET Developer
    </text>
    
    <text x="60" y="430" font-family="Arial, sans-serif" font-size="28" fill="#CBD5E1">
      3.9+ Years of Experience • ASP.NET Core • C# • AWS
    </text>
    
    <!-- Decorative Elements -->
    <circle cx="1100" cy="100" r="50" fill="#06B6D4" opacity="0.1"/>
    <circle cx="100" cy="520" r="40" fill="#0EA5E9" opacity="0.1"/>
    
    <!-- Bottom tagline -->
    <text x="60" y="580" font-family="Arial, sans-serif" font-size="20" fill="#94A3B8">
      Crafting scalable web solutions with modern technologies
    </text>
  </g>
</svg>